<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14203a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="阿爾卑斯手冊">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>阿爾卑斯湖光山色 · 21日手冊</title>
<style>
  :root{
    --navy:#14203a; --navy-2:#1b2c4d; --navy-3:#233860;
    --ink:#1a2338; --paper:#f4f1e9; --paper-2:#ece7db;
    --card:#ffffff; --line:#dcd6c8; --line-soft:#e7e2d5;
    --gold:#cf9a3d; --gold-soft:#e7c988; --gold-deep:#a9781f;
    --muted:#6d6857; --muted-2:#8a8676;
    --r-munich:#2b4670; --r-salz:#2f6b5b; --r-zell:#2e4f86;
    --r-inns:#b07d2a; --r-dolo:#3a6b4a; --r-verona:#b45f3a; --r-farewell:#2b4670;
    --shadow:0 1px 2px rgba(20,32,58,.06),0 8px 24px rgba(20,32,58,.08);
    --radius:16px; --radius-sm:11px;
    --serif:"Noto Serif TC",Georgia,"Songti TC",serif;
    --sans:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans); color:var(--ink); background:var(--paper); line-height:1.6;
    -webkit-font-smoothing:antialiased; padding-bottom:calc(66px + env(safe-area-inset-bottom))}
  a{color:inherit}
  button{font-family:inherit; cursor:pointer; border:none; background:none}
  .wrap{max-width:640px; margin:0 auto; min-height:100vh; background:var(--paper); position:relative}

  .topbar{position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:10px;
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    background:rgba(20,32,58,.92); backdrop-filter:blur(10px); color:#f4f1e9; border-bottom:1px solid rgba(207,154,61,.28)}
  .topbar .brand{font-family:var(--serif); font-weight:700; font-size:16px; letter-spacing:.5px; flex:1; min-width:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .topbar .brand small{display:block; font-family:var(--sans); font-weight:400; font-size:10.5px; letter-spacing:2px; color:var(--gold-soft); text-transform:uppercase}
  .icon-btn{width:38px; height:38px; border-radius:11px; display:grid; place-items:center; color:#f4f1e9; background:rgba(255,255,255,.08)}
  .icon-btn:active{background:rgba(255,255,255,.18)}
  .icon-btn svg{width:20px;height:20px}

  .view{display:none; animation:fade .28s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){.view,.view.active{animation:none} *{scroll-behavior:auto!important}}

  .hero{position:relative; background:linear-gradient(180deg,#14203a 0%,#1b2c4d 100%); color:#f4f1e9; padding:26px 20px 30px; overflow:hidden}
  .hero .peaks{position:absolute; left:0; right:0; bottom:0; height:120px; opacity:.5}
  .hero .sun{position:absolute; top:22px; right:24px; width:66px; height:66px; border-radius:50%;
    background:radial-gradient(circle at 40% 40%,#e7c988,#cf9a3d); box-shadow:0 0 40px rgba(207,154,61,.4)}
  .hero .eyebrow{font-size:10.5px; letter-spacing:3px; color:var(--gold-soft); text-transform:uppercase; position:relative}
  .hero h1{font-family:var(--serif); font-size:29px; line-height:1.22; margin:12px 0 4px; position:relative; font-weight:700}
  .hero .h1-en{font-family:var(--serif); font-style:italic; font-size:17px; color:var(--gold-soft); position:relative; margin-bottom:14px}
  .hero .meta{position:relative; font-size:12.5px; color:#cdd6e6; letter-spacing:.3px}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:14px; position:relative}
  .chip{font-size:11px; padding:5px 11px; border-radius:999px; background:rgba(255,255,255,.09); border:1px solid rgba(231,201,136,.3); color:#eef2f8}

  .countdown{margin:16px; background:var(--navy); color:#f4f1e9; border-radius:var(--radius); padding:18px 20px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow)}
  .countdown .big{font-family:var(--serif); font-size:38px; line-height:1; font-weight:700; color:var(--gold-soft)}
  .countdown .lbl{font-size:12px; color:#cdd6e6}
  .countdown .lbl strong{display:block; font-size:14.5px; color:#fff; font-weight:600; margin-bottom:2px}

  .contact{margin:0 16px 4px; background:linear-gradient(135deg,#243a5e,#1b2c4d); border:1px solid rgba(231,201,136,.25); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; gap:13px; box-shadow:var(--shadow); color:#f4f1e9}
  .contact .cav{width:42px; height:42px; border-radius:12px; background:var(--gold); color:#1b2c4d; display:grid; place-items:center; font-weight:700; font-family:var(--serif); font-size:17px; flex-shrink:0}
  .contact .cinfo{flex:1; min-width:0}
  .contact .crole{font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold-soft)}
  .contact .cname{font-size:15px; font-weight:700}
  .contact .cnum{font-size:12.5px; color:#c6d0e2; font-variant-numeric:tabular-nums; margin-top:1px}
  .contact .cbtns{display:flex; gap:8px}
  .contact .cbtn{width:40px; height:40px; border-radius:11px; display:grid; place-items:center; background:rgba(255,255,255,.12); color:#fff}
  .contact .cbtn:active{background:rgba(255,255,255,.25)}
  .contact .cbtn svg{width:19px;height:19px}

  .sec{padding:6px 16px 4px}
  .sec-head{display:flex; align-items:baseline; justify-content:space-between; margin:18px 0 12px}
  .sec-head h2{font-family:var(--serif); font-size:19px; font-weight:700; margin:0; letter-spacing:.3px}
  .sec-head .en{font-size:10px; letter-spacing:2px; color:var(--muted-2); text-transform:uppercase}

  .tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; padding:2px 16px 4px}
  .tile{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius-sm); padding:13px 6px 11px; text-align:center; box-shadow:var(--shadow)}
  .tile:active{transform:scale(.97)}
  .tile .ic{font-size:21px; line-height:1}
  .tile .t{font-size:11.5px; margin-top:6px; color:var(--ink); font-weight:600}

  .route{margin:2px 16px 8px; background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); padding:6px 4px; box-shadow:var(--shadow)}
  .route-item{display:flex; align-items:center; gap:12px; padding:11px 14px; position:relative}
  .route-item:not(:last-child)::after{content:""; position:absolute; left:26px; top:34px; bottom:-6px; width:2px; background:var(--line)}
  .route-dot{width:22px; height:22px; border-radius:50%; flex-shrink:0; display:grid; place-items:center; color:#fff; font-size:10px; font-weight:700; z-index:1}
  .route-item .rn{font-size:14px; font-weight:600}
  .route-item .rd{font-size:11.5px; color:var(--muted)}

  .seg-label{display:flex; align-items:center; gap:9px; margin:20px 4px 10px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted-2); font-weight:600}
  .seg-label::before{content:""; width:14px; height:2px; border-radius:2px; background:var(--seg,#999)}
  .daycard{display:flex; background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden}
  .daycard:active{transform:scale(.995)}
  .daycard.today{border-color:var(--gold); box-shadow:0 0 0 2px rgba(207,154,61,.25),var(--shadow)}
  .daycard .thumb{width:92px; flex-shrink:0; position:relative; background:var(--seg,#334)}
  .daycard .thumb svg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .daycard .body{padding:12px 14px 13px; flex:1; min-width:0}
  .daycard .dnum{display:flex; align-items:center; gap:8px; margin-bottom:3px}
  .daycard .dnum .d{font-family:var(--serif); font-weight:700; font-size:13px; color:var(--seg,#333)}
  .daycard .dnum .date{font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums}
  .daycard .dnum .tag-today{margin-left:auto; font-size:10px; font-weight:700; color:#fff; background:var(--gold); padding:2px 8px; border-radius:999px; letter-spacing:.5px}
  .daycard h3{font-size:15px; margin:1px 0 3px; font-weight:700; line-height:1.35}
  .daycard .leg{font-size:11.5px; color:var(--muted); line-height:1.45}
  .daycard .leg .mode{color:var(--seg,#555); font-weight:600}
  .daycard .hotel-row{font-size:11px; color:var(--muted-2); margin-top:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

  /* Day detail */
  .detail-hero{position:relative; color:#fff; min-height:214px; display:flex; flex-direction:column; justify-content:flex-end; overflow:hidden; background:#24406b}
  .dh-illu{position:absolute; inset:0}
  .dh-illu svg{width:100%; height:100%; display:block}
  .dh-scrim{position:absolute; inset:0; background:linear-gradient(180deg,rgba(20,32,58,.12) 0%,rgba(20,32,58,.30) 42%,rgba(20,32,58,.85) 100%)}
  .dh-back{position:absolute; top:calc(env(safe-area-inset-top) + 10px); left:14px; z-index:3;
    display:inline-flex; align-items:center; gap:5px; font-size:13px; color:#fff; font-weight:600;
    background:rgba(20,32,58,.5); padding:7px 12px 7px 9px; border-radius:999px; backdrop-filter:blur(4px)}
  .dh-content{position:relative; z-index:2; padding:18px 18px 18px}
  .dh-content .eyebrow{font-size:10px; letter-spacing:2.5px; text-transform:uppercase; opacity:.9}
  .dh-row{display:flex; justify-content:space-between; align-items:flex-end; gap:12px; margin-top:6px}
  .dh-content h2{font-family:var(--serif); font-size:25px; margin:2px 0 0; font-weight:700; line-height:1.2; text-shadow:0 1px 12px rgba(0,0,0,.35)}
  .dh-date{text-align:right; flex-shrink:0}
  .dh-date .dd{font-family:var(--serif); font-size:22px; font-weight:700}
  .dh-date .wd{font-size:11px; opacity:.9}
  .dh-sub{font-size:12.5px; opacity:.95; margin-top:9px; line-height:1.5}

  .block{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); margin:14px 16px; padding:15px 16px; box-shadow:var(--shadow)}
  .block-title{display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700; letter-spacing:.5px; color:var(--seg,#333); margin-bottom:11px; text-transform:uppercase}
  .block-title .em{font-size:15px}
  .prose{font-size:13.5px; color:#33384a; line-height:1.72}
  .prose + .prose{margin-top:10px}

  .flow{display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:12px}
  .flow .node{background:var(--paper-2); border:1px solid var(--line); border-radius:8px; padding:4px 9px; font-weight:600; color:var(--ink)}
  .flow .arr{color:var(--seg,#888); font-weight:700}
  .note-line{font-size:12px; color:var(--muted); margin-top:11px; line-height:1.55; padding-top:11px; border-top:1px dashed var(--line)}
  .note-line b{color:var(--ink)}

  .spot{padding:14px 0; border-top:1px solid var(--line-soft)}
  .spot:first-of-type{border-top:none; padding-top:2px}
  .spot .sh{display:flex; align-items:baseline; gap:9px}
  .spot .sn{width:22px; height:22px; border-radius:50%; background:var(--seg,#333); color:#fff; font-size:11px; font-weight:700; display:grid; place-items:center; flex-shrink:0}
  .spot h4{font-size:15.5px; margin:0; font-weight:700}
  .spot .sen{font-family:var(--serif); font-style:italic; font-size:12.5px; color:var(--muted); font-weight:400}
  .spot p{font-size:13px; color:#3d4356; margin:8px 0 0; line-height:1.62}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px}
  .tag{font-size:10.5px; padding:3px 9px; border-radius:999px; background:color-mix(in srgb,var(--seg,#888) 10%,#fff); color:var(--seg,#555); border:1px solid color-mix(in srgb,var(--seg,#888) 22%,#fff); font-weight:600}

  .eat-row{display:flex; gap:12px; padding:10px 0; border-top:1px solid var(--line-soft); align-items:baseline}
  .eat-row:first-of-type{border-top:none}
  .eat-row .edot{font-size:15px; flex-shrink:0}
  .eat-row .en2{font-size:14px; font-weight:700}
  .eat-row .een{font-family:var(--serif); font-style:italic; font-size:11.5px; color:var(--muted); margin-left:4px}
  .eat-row .ed{font-size:12px; color:#3d4356; margin-top:2px; line-height:1.5}

  .quiz{background:linear-gradient(135deg,#1f3152,#16233f); color:#eef2f8; border-radius:var(--radius); margin:14px 16px; padding:16px 17px; box-shadow:var(--shadow); border:1px solid rgba(231,201,136,.22)}
  .quiz .qh{display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold-soft); margin-bottom:9px}
  .quiz .qq{font-size:14px; font-weight:600; line-height:1.6}
  .quiz details{margin-top:12px}
  .quiz summary{list-style:none; display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:#16233f; background:var(--gold-soft); padding:8px 15px; border-radius:999px; cursor:pointer}
  .quiz summary::-webkit-details-marker{display:none}
  .quiz details[open] summary{display:none}
  .quiz .qa{font-size:13px; line-height:1.7; margin-top:2px; color:#dfe6f0; background:rgba(255,255,255,.06); padding:12px 14px; border-radius:11px; border-left:3px solid var(--gold-soft)}

  .hotel-block{margin:14px 16px; background:linear-gradient(135deg,var(--navy),var(--navy-2)); color:#f4f1e9; border-radius:var(--radius); padding:15px 17px; box-shadow:var(--shadow)}
  .hotel-block .hb-top{display:flex; align-items:center; gap:13px}
  .hotel-block .hb-ic{font-size:22px}
  .hotel-block .hb-city{font-size:11px; color:var(--gold-soft); letter-spacing:1px; text-transform:uppercase}
  .hotel-block .hb-name{font-size:15px; font-weight:700; margin-top:1px}
  .hotel-block .hb-area{font-size:12px; color:#c6d0e2; margin-top:9px; line-height:1.5; display:flex; gap:7px}
  .hotel-block .hb-area::before{content:"📍"; font-size:12px}
  .hotel-block .hb-note{font-size:11.5px; color:#aab7cf; margin-top:6px}
  .hotel-block .hb-map{margin-top:12px; display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:#16233f; background:var(--gold-soft); padding:9px 15px; border-radius:999px}
  .hotel-block .hb-map svg{width:15px;height:15px}

  .tips-block{margin:14px 16px}
  .tip{display:flex; gap:10px; font-size:12.5px; color:#3d4356; padding:8px 0; line-height:1.5; align-items:flex-start}
  .tip::before{content:"›"; color:var(--gold-deep); font-weight:700; font-size:15px; line-height:1.2}

  .daynav{display:flex; gap:10px; margin:6px 16px 24px}
  .daynav a{flex:1; text-align:center; padding:12px; background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius-sm); font-size:12.5px; font-weight:600; color:var(--ink); box-shadow:var(--shadow)}
  .daynav a.disabled{opacity:.35; pointer-events:none}
  .daynav a span{display:block; font-size:10px; color:var(--muted-2); font-weight:400; margin-bottom:2px}

  .card{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); margin:0 16px 11px; padding:15px 16px; box-shadow:var(--shadow)}
  .card-h{display:flex; align-items:baseline; gap:9px; margin-bottom:4px}
  .num-badge{width:24px; height:24px; border-radius:7px; background:var(--navy); color:var(--gold-soft); font-family:var(--serif); font-weight:700; font-size:13px; display:grid; place-items:center; flex-shrink:0}
  .card h3{font-size:15.5px; margin:0; font-weight:700}
  .card .sub{font-family:var(--serif); font-style:italic; font-size:12px; color:var(--muted)}
  .kv{display:flex; gap:14px; flex-wrap:wrap; margin-top:9px; font-size:12px}
  .kv .k{color:var(--muted-2)}
  .kv .v{font-weight:600; color:var(--ink)}
  .card p{font-size:12.5px; color:#3d4356; margin:9px 0 0; line-height:1.6}
  .alt{font-size:13px; font-weight:700; color:var(--gold-soft); background:var(--navy); border-radius:999px; padding:2px 10px; margin-left:auto; font-variant-numeric:tabular-nums}

  .intro-note{margin:0 16px 14px; font-size:12.5px; color:var(--muted); line-height:1.6; padding:12px 15px; background:var(--paper-2); border-radius:var(--radius-sm); border:1px solid var(--line-soft)}
  .intro-note b{color:var(--ink)}

  .food-group{margin:0 16px 12px}
  .food-group .fg-head{display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:700; margin-bottom:8px; color:var(--ink)}
  .food-group .fg-em{font-size:18px}
  .food-item{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius-sm); padding:11px 14px; margin-bottom:7px; box-shadow:var(--shadow)}
  .food-item .fn{font-size:14px; font-weight:700}
  .food-item .fen{font-family:var(--serif); font-style:italic; font-size:11.5px; color:var(--muted); margin-left:4px}
  .food-item .fd{font-size:12px; color:#3d4356; margin-top:3px; line-height:1.5}

  .hotel-item{display:flex; background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); margin:0 16px 10px; box-shadow:var(--shadow); overflow:hidden}
  .hotel-item .hi-rail{width:6px; flex-shrink:0; background:var(--seg,#999)}
  .hotel-item .hi-body{padding:13px 15px; flex:1; min-width:0}
  .hotel-item .hi-date{font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums}
  .hotel-item .hi-city{font-size:11px; color:var(--seg,#555); font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-top:2px}
  .hotel-item .hi-name{font-size:15px; font-weight:700; margin-top:1px}
  .hotel-item .hi-area{font-size:11.5px; color:var(--muted-2); margin-top:4px; line-height:1.45}
  .hotel-item .hi-nights{font-size:11px; color:#fff; background:var(--seg,#888); border-radius:999px; padding:2px 9px; font-weight:600; white-space:nowrap}
  .hotel-item .hi-map{display:inline-flex; align-items:center; gap:5px; margin-top:9px; font-size:12px; font-weight:700; color:var(--gold-deep)}
  .hotel-item .hi-map svg{width:14px;height:14px}

  .info-card{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius-sm); margin:0 16px 8px; box-shadow:var(--shadow); overflow:hidden}
  .info-card summary{list-style:none; padding:14px 16px; display:flex; align-items:center; gap:11px; font-size:14px; font-weight:600; cursor:pointer}
  .info-card summary::-webkit-details-marker{display:none}
  .info-card summary .chev{margin-left:auto; color:var(--muted-2); transition:transform .2s}
  .info-card[open] summary .chev{transform:rotate(90deg)}
  .info-card .info-body{padding:0 16px 15px 44px; font-size:12.5px; color:#3d4356; line-height:1.62}
  .info-card summary .em{font-size:18px}

  .emerg{margin:0 16px 12px; background:linear-gradient(135deg,#7a2020,#a83232); color:#fff; border-radius:var(--radius); padding:16px 18px; display:flex; align-items:center; gap:15px; box-shadow:var(--shadow)}
  .emerg .num{font-family:var(--serif); font-size:34px; font-weight:700; line-height:1}
  .emerg .et{font-size:12.5px; opacity:.95}
  .emerg .et strong{display:block; font-size:14px; margin-bottom:2px}

  .phrases{margin:0 16px 12px}
  .phrase-row{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line-soft); font-size:13px; align-items:center}
  .phrase-row:last-child{border:none}
  .phrase-row .lang{font-size:10px; font-weight:700; color:#fff; background:var(--navy); border-radius:6px; padding:3px 7px; letter-spacing:.5px; flex-shrink:0}
  .phrase-row .pz{color:var(--muted); flex-shrink:0}
  .phrase-row .pf{font-weight:600; margin-left:auto}

  .check-item{display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius-sm); margin:0 16px 7px; box-shadow:var(--shadow); font-size:13.5px}
  .check-item input{width:20px; height:20px; accent-color:var(--gold-deep); flex-shrink:0}
  .check-item.done label{text-decoration:line-through; color:var(--muted-2)}
  .check-item label{flex:1; cursor:pointer}

  .page-title{padding:calc(env(safe-area-inset-top) + 14px) 16px 4px}
  .page-title .en{font-size:10.5px; letter-spacing:3px; color:var(--gold-deep); text-transform:uppercase; font-weight:600}

/* =========================================================
   工具
   ========================================================= */
const $ = s => document.querySelector(s);
const mainEl = $("#main");
const today = new Date(); today.setHours(0,0,0,0);
const startDate = new Date(TRIP.start+"T00:00:00");
const endDate = new Date(TRIP.end+"T00:00:00");
const dayMs = 86400000;
const daysUntil = () => Math.round((startDate-today)/dayMs);
function tripDayIndex(){ if(today<startDate||today>endDate) return -1; return Math.round((today-startDate)/dayMs); }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const segVar = region => `style="--seg:${REGION[region].seg}"`;
const mapsUrl = q => "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);
const dayIllu = d => (d.illu||(d.place&&PLACES[d.place]?PLACES[d.place].illu:null));

let checkState = {};
try{ checkState = JSON.parse(localStorage.getItem("alps_check")||"{}"); }catch(e){ checkState={}; }
const saveCheck = () => { try{ localStorage.setItem("alps_check",JSON.stringify(checkState)); }catch(e){} };

const TABS = [
  {id:"home",label:"首頁",icon:'<path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/>'},
  {id:"days",label:"逐日行程",icon:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>'},
  {id:"stay",label:"住宿",icon:'<path d="M3 21V7l9-4 9 4v14"/><path d="M9 21v-6h6v6"/>'},
  {id:"lifts",label:"纜車",icon:'<path d="M3 7h18"/><circle cx="7" cy="7" r="1.5"/><path d="M7 8.5V21m0-6 5-4 5 4M17 8.5V21"/>'},
  {id:"info",label:"資訊",icon:'<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>'},
];
function renderTabs(active){
  $("#tabbar").innerHTML = TABS.map(t=>`<a class="tab ${active===t.id?'active':''}" href="#/${t.id}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg>
    <span>${t.label}</span></a>`).join("");
}
function route(){
  const h = location.hash.replace(/^#\//,"") || "home";
  const [page,arg] = h.split("/");
  window.scrollTo(0,0);
  if(page==="day"){ renderDay(+arg); renderTabs("days"); }
  else if(page==="days"){ renderDays(); renderTabs("days"); }
  else if(page==="stay"){ renderStay(); renderTabs("stay"); }
  else if(page==="lifts"){ renderLifts(); renderTabs("lifts"); }
  else if(page==="food"){ renderFood(); renderTabs("info"); }
  else if(page==="rail"){ renderRail(); renderTabs("info"); }
  else if(page==="info"){ renderInfo(); renderTabs("info"); }
  else { renderHome(); renderTabs("home"); }
}
window.addEventListener("hashchange",route);
const shell = inner => `<div class="view active">${inner}</div>`;

function bindCopy(scope){
  scope.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",()=>{
    const v=b.dataset.copy;
    const ok=()=>{const s=b.innerHTML;b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';setTimeout(()=>b.innerHTML=s,1200);};
    try{ navigator.clipboard.writeText(v).then(ok,ok); }catch(e){ ok(); }
  }));
}

/* ---------- 逐日清單 ---------- */
function renderDays(){
  const tdi = tripDayIndex();
  let html = `<div class="page-title"><div class="en">Day by day</div><h1>逐日行程</h1><p>21 天 / 19 晚 · 點任一天看歷史、美食與猜謎</p></div><div style="padding:6px 16px 30px">`;
  let lastReg=null;
  DAYS.forEach((d,idx)=>{
    if(d.region!==lastReg){ html+=`<div class="seg-label" style="--seg:${REGION[d.region].seg}">${esc(REGION[d.region].name)}</div>`; lastReg=d.region; }
    const isToday=idx===tdi;
    const il=dayIllu(d);
    html+=`<a class="daycard ${isToday?'today':''}" href="#/day/${d.n}" ${segVar(d.region)}>
      <div class="thumb">${il?ILLU[il]:''}</div>
      <div class="body">
        <div class="dnum"><span class="d">DAY ${d.n}</span><span class="date">${esc(d.date)}（${esc(d.wd)}）</span>${isToday?'<span class="tag-today">今天</span>':''}</div>
        <h3>${esc(d.title)}</h3>
        <div class="leg"><span class="mode">${esc(d.leg.mode)}</span><br>${esc(d.leg.from)} → ${esc(d.leg.to)} · ${esc(d.leg.dur)}</div>
        ${d.hotel!=null?`<div class="hotel-row">🏨 ${esc(HOTELS[d.hotel].name)}</div>`:'<div class="hotel-row">✈️ 返抵台北</div>'}
      </div></a>`;
  });
  html+=`</div>`;
  mainEl.innerHTML = shell(html);
  $("#topTitle").innerHTML = `逐日行程<small>21 天 / 19 晚</small>`;
}

/* ---------- 單日詳情 ---------- */
function renderDay(n){
  const d = DAYS.find(x=>x.n===n);
  if(!d){ location.hash="#/days"; return; }
  const c = REGION[d.region].seg;
  const p = d.place?PLACES[d.place]:null;
  const il = dayIllu(d);
  const flow = d.leg.flow.map((f,i)=>`<span class="node">${esc(f)}</span>`+(i<d.leg.flow.length-1?`<span class="arr">→</span>`:``)).join("");
  const spots = d.spots.map(sp=>`<div class="spot" style="--seg:${c}">
      <div class="sh"><span class="sn">${sp.i}</span><div><h4>${esc(sp.name)} <span class="sen">${esc(sp.en)}</span></h4></div></div>
      <p>${esc(sp.desc)}</p>
      <div class="tags">${sp.tags.map(t=>`<span class="tag" style="--seg:${c}">${esc(t)}</span>`).join("")}</div>
    </div>`).join("");

  const aboutBlock = p&&p.about?`<div class="block" style="--seg:${c}"><div class="block-title"><span class="em">📖</span>認識這個地方</div><div class="prose">${esc(p.about)}</div></div>`:``;
  const histBlock = p&&p.history?`<div class="block" style="--seg:${c}"><div class="block-title"><span class="em">🏛</span>歷史沿革</div><div class="prose">${esc(p.history)}</div></div>`:``;

  let eatBlock=``;
  if(p&&p.food){ const g=foodById(p.food);
    if(g){ eatBlock=`<div class="block" style="--seg:${c}"><div class="block-title"><span class="em">${g.em}</span>當地美食 · ${esc(g.group.split("·")[0].trim())}</div>
      ${g.items.map(it=>`<div class="eat-row"><span class="edot">🍽</span><div><div><span class="en2">${esc(it.n)}</span><span class="een">${esc(it.en)}</span></div><div class="ed">${esc(it.d)}</div></div></div>`).join("")}</div>`; }
  }

  const quizBlock = p&&p.quiz?`<div class="quiz">
      <div class="qh">🧩 趣味猜謎 · Fun Fact</div>
      <div class="qq">${esc(p.quiz.q)}</div>
      <details><summary>看答案 ▾</summary><div class="qa">${esc(p.quiz.a)}</div></details>
    </div>`:``;

  let hotelBlock;
  if(d.hotel!=null){ const h=HOTELS[d.hotel];
    hotelBlock=`<div class="hotel-block">
      <div class="hb-top"><div class="hb-ic">🏨</div><div><div class="hb-city">${esc(h.city)}</div><div class="hb-name">${esc(h.name)}</div></div></div>
      <div class="hb-area">${esc(h.area)}</div>
      <div class="hb-note">${esc(h.date)} · ${esc(h.nights)}</div>
      <a class="hb-map" href="${mapsUrl(h.q)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>在地圖開啟</a>
    </div>`;
  } else {
    hotelBlock=`<div class="hotel-block"><div class="hb-top"><div class="hb-ic">✈️</div><div><div class="hb-city">Farewell</div><div class="hb-name">返抵台北</div></div></div><div class="hb-note">帶著五座纜車、三國湖光的金色記憶回家</div></div>`;
  }

  const tips = d.tips.map(t=>`<div class="tip">${esc(t)}</div>`).join("");
  const prev = DAYS.find(x=>x.n===n-1), next = DAYS.find(x=>x.n===n+1);

  const inner = `
  <div class="detail-hero">
    <div class="dh-illu">${il?ILLU[il]:''}</div>
    <div class="dh-scrim"></div>
    <a class="dh-back" href="#/days"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>逐日</a>
    <div class="dh-content">
      <div class="eyebrow">${esc(REGION[d.region].name)}</div>
      <div class="dh-row"><h2>${esc(d.title)}</h2><div class="dh-date"><div class="dd">DAY ${d.n}</div><div class="wd">${esc(d.date)} · ${esc(d.wd)}</div></div></div>
      <div class="dh-sub">${esc(d.sub)}</div>
    </div>
  </div>

  <div class="block" style="--seg:${c}"><div class="block-title"><span class="em">🚆</span>今日交通 · ${esc(d.leg.mode)}</div>
    <div class="flow">${flow}</div><div class="note-line">${esc(d.leg.note)}</div></div>

  ${aboutBlock}
  ${histBlock}

  <div class="block" style="--seg:${c}"><div class="block-title"><span class="em">📍</span>今日重點</div>${spots}</div>

  ${eatBlock}
  ${quizBlock}
  ${hotelBlock}

  <div class="tips-block"><div class="block-title" style="--seg:${c};padding:0 2px">💡 小提醒</div>${tips}</div>

  <div class="daynav">
    <a class="${prev?'':'disabled'}" href="${prev?'#/day/'+prev.n:'#'}"><span>← 前一天</span>${prev?'DAY '+prev.n+' · '+esc(prev.date):'—'}</a>
    <a class="${next?'':'disabled'}" href="${next?'#/day/'+next.n:'#'}"><span>後一天 →</span>${next?'DAY '+next.n+' · '+esc(next.date):'—'}</a>
  </div>`;
  mainEl.innerHTML = shell(inner);
  $("#topTitle").innerHTML = `DAY ${d.n} · ${esc(d.date)}<small>${esc(REGION[d.region].name)}</small>`;
}

  const extra = LIFTS_EXTRA.map(l=>`<div class="card"><div class="card-h"><h3>${esc(l.name)}</h3><span class="alt">${esc(l.alt)}</span></div><p>${esc(l.note)}</p></div>`).join("");
  const inner = `<div class="page-title"><div class="en">Five summit lifts</div><h1>五座登頂纜車</h1><p>免爬登頂 · 最高 3029m · 全程搭車</p></div>
    <div class="intro-note">各段票價／時間為概估，請以官網即時資訊為準；<b>通票多不含纜車</b>，須當地或官網另購、預約時段。山頂常比平地低 15–20°C，防風保暖層必備。</div>
    ${items}
    <div class="sec"><div class="sec-head"><h2>多洛米蒂纜車</h2><span class="en">Included</span></div></div>
    ${extra}<div style="height:24px"></div>`;
  mainEl.innerHTML = shell(inner);
  $("#topTitle").innerHTML = `纜車制高點<small>5 座登頂</small>`;
}

/* ---------- 美食 ---------- */
function renderFood(){
  const groups = FOOD.map(g=>`<div class="food-group"><div class="fg-head"><span class="fg-em">${g.em}</span>${esc(g.group)}</div>
      ${g.items.map(it=>`<div class="food-item"><div class="fn">${esc(it.n)}<span class="fen">${esc(it.en)}</span></div><div class="fd">${esc(it.d)}</div></div>`).join("")}</div>`).join("");
  const inner = `<div class="page-title"><div class="en">Taste along the route</div><h1>沿線當地美食</h1><p>巴伐利亞 · 提洛 · 南提洛 · 維洛納</p></div>
    <div class="intro-note">山屋與湖畔餐廳旺季務必先訂位；提洛與南提洛的份量偏大，可分食。義大利老城多有 ZTL 管制，徒步用餐最方便。</div>
    ${groups}<div style="height:24px"></div>`;
  mainEl.innerHTML = shell(inner);
  $("#topTitle").innerHTML = `沿線美食<small>吃什麼</small>`;
}

/* ---------- 火車票券 ---------- */
function renderRail(){
  const rows = RAIL.map(r=>`<div class="card"><div class="card-h"><h3 style="font-size:14px">${esc(r.leg)}</h3></div>
      <div class="kv"><span><span class="k">官網</span> <span class="v">${esc(r.site)}</span></span><span><span class="k">票種</span> <span class="v">${esc(r.type)}</span></span></div><p>${esc(r.note)}</p></div>`).join("");
  const tips = RAIL_TIPS.map(t=>`<div class="card"><div class="card-h"><h3 style="font-size:14.5px">💡 ${esc(t.t)}</h3></div><p>${esc(t.d)}</p></div>`).join("");
  const inner = `<div class="page-title"><div class="en">Best value for 6</div><h1>火車票券怎麼買</h1><p>跨境長途買早鳥點對點票，比 Eurail 通票更省</p></div>
    <div class="intro-note"><b>結論：</b>跨境長途段買早鳥點對點票、纜車當地／官網預約、楚格峰用邦票。ÖBB / DB / Trenitalia 官網可一次訂 6 張同班並選相鄰座。</div>
    ${rows}
    <div class="sec"><div class="sec-head"><h2>省錢要點</h2><span class="en">Tips</span></div></div>
    ${tips}
    <div class="card" style="background:var(--navy);color:#f4f1e9;border-color:var(--navy-3)"><div class="card-h"><h3 style="color:#fff">✦ 行動順序</h3></div>
      <p style="color:#cdd6e6">① 現在先訂跨境早鳥票 → ② 訂房問 guest card → ③ 出發前 1–2 週預約纜車時段 → ④ 楚格峰當天買邦票＋登頂票。</p></div>
    <div style="height:24px"></div>`;
  mainEl.innerHTML = shell(inner);
  $("#topTitle").innerHTML = `火車票券<small>6 人最划算</small>`;
}

/* ---------- 資訊 ---------- */
function renderInfo(){
  const cards = INFO.map(i=>`<details class="info-card"><summary><span class="em">${i.em}</span>${esc(i.t)}<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></summary><div class="info-body">${esc(i.d)}</div></details>`).join("");
  const phrases = PHRASES.map(p=>`<div class="phrase-row"><span class="lang">${esc(p.lang)}</span><span class="pz">${esc(p.z)}</span><span class="pf">${esc(p.f)}</span></div>`).join("");
  const checks = CHECKLIST.map((c,i)=>{const done=!!checkState[i];return `<div class="check-item ${done?'done':''}" data-i="${i}"><input type="checkbox" id="ck${i}" ${done?'checked':''}><label for="ck${i}">${esc(c)}</label></div>`;}).join("");
  const inner = `<div class="page-title"><div class="en">Good to know</div><h1>當地旅遊注意事項</h1><p>出發前讀一遍，旅途更從容</p></div>
    ${contactCard()}
    <div style="height:6px"></div>
    <div class="emerg"><div class="num">112</div><div class="et"><strong>全歐通用緊急電話</strong>可英語通話，建議先存入手機。德奧義通用。</div></div>
    ${cards}
    <div class="sec"><div class="sec-head"><h2>實用招呼語</h2><span class="en">Phrases</span></div></div>
    <div class="card phrases">${phrases}</div>
    <div class="sec"><div class="sec-head"><h2>打包清單</h2><span class="en">Packing · 可勾選</span></div></div>
    <div id="checklist" style="padding-bottom:6px">${checks}</div>
    <div class="footer-note">樂齡節奏：纜車優先搭早場、午後保留休息。行程已刻意放慢，量力而為最重要。</div><div style="height:20px"></div>`;
  mainEl.innerHTML = shell(inner);
  bindCopy(mainEl);
  $("#topTitle").innerHTML = `旅遊資訊<small>Good to know</small>`;
  $("#checklist").addEventListener("change", e=>{
    if(e.target.matches("input[type=checkbox]")){ const row=e.target.closest(".check-item"); const i=row.dataset.i;
      checkState[i]=e.target.checked; row.classList.toggle("done",e.target.checked); saveCheck(); }
  });
}

/* =========================================================
   搜尋（含歷史、美食、猜謎）
   ========================================================= */
function buildIndex(){
  const idx=[];
  DAYS.forEach(d=>{
    const p=d.place?PLACES[d.place]:null;
    idx.push({group:"逐日行程",title:`DAY ${d.n} · ${d.title}`,desc:`${d.date}（${d.wd}）· ${d.leg.from} → ${d.leg.to}`,hash:`#/day/${d.n}`,
      hay:`day${d.n} ${d.title} ${d.sub} ${d.leg.from} ${d.leg.to} ${d.leg.mode} ${d.date} ${p?p.about+" "+p.history:""}`});
    d.spots.forEach(sp=>idx.push({group:"景點 · 制高點",title:sp.name,desc:`${sp.en} · DAY ${d.n}`,hash:`#/day/${d.n}`,hay:`${sp.name} ${sp.en} ${sp.desc} ${sp.tags.join(" ")}`}));
    if(p&&p.quiz) idx.push({group:"趣味猜謎",title:`DAY ${d.n} 猜謎`,desc:p.quiz.q,hash:`#/day/${d.n}`,hay:`${p.quiz.q} ${p.quiz.a}`});
    if(d.hotel!=null){const h=HOTELS[d.hotel];idx.push({group:"住宿",title:h.name,desc:`${h.city} · ${h.area}`,hash:`#/day/${d.n}`,hay:`${h.name} ${h.city} ${h.area}`});}
  });
  LIFTS.forEach(l=>idx.push({group:"纜車",title:`${l.name} · ${l.alt}`,desc:`${l.en} · ${l.price}`,hash:`#/lifts`,hay:`${l.name} ${l.en} ${l.how} ${l.note} ${l.alt}`}));
  LIFTS_EXTRA.forEach(l=>idx.push({group:"纜車",title:`${l.name} · ${l.alt}`,desc:l.note,hash:`#/lifts`,hay:`${l.name} ${l.note}`}));
  FOOD.forEach(g=>g.items.forEach(it=>idx.push({group:"美食",title:it.n,desc:`${it.en} · ${g.group}`,hash:`#/food`,hay:`${it.n} ${it.en} ${it.d} ${g.group}`})));
  RAIL.forEach(r=>idx.push({group:"火車票券",title:r.leg,desc:`${r.site} · ${r.type}`,hash:`#/rail`,hay:`${r.leg} ${r.site} ${r.type} ${r.note}`}));
  INFO.forEach(i=>idx.push({group:"注意事項",title:i.t,desc:i.d.slice(0,40),hash:`#/info`,hay:`${i.t} ${i.d}`}));
  return idx;
}
const SEARCH_INDEX = buildIndex();
function highlight(text,q){ if(!q) return esc(text); const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text); return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length)); }
function doSearch(q){
  const res=$("#searchResults"); q=q.trim();
  if(!q){ res.innerHTML=`<div class="sr-hint">搜尋地點、歷史、美食、旅館或猜謎<div class="sr-chips">
      ${["黃金屋頂","Seceda","基茨峰","冰人 Ötzi","炸牛排","茱麗葉","客人卡","112"].map(k=>`<button data-k="${k}">${k}</button>`).join("")}</div></div>`;
    res.querySelectorAll("button[data-k]").forEach(b=>b.onclick=()=>{ $("#searchInput").value=b.dataset.k; doSearch(b.dataset.k); $("#searchInput").focus(); }); return; }
  const ql=q.toLowerCase();
  const hits=SEARCH_INDEX.filter(x=>x.hay.toLowerCase().includes(ql));
  if(!hits.length){ res.innerHTML=`<div class="sr-empty">找不到「${esc(q)}」<br><span style="font-size:12px">試試地名、旅館名或纜車名稱</span></div>`; return; }
  const groups={}; hits.forEach(h=>{(groups[h.group]=groups[h.group]||[]).push(h);});
  res.innerHTML=Object.keys(groups).map(g=>`<div class="sr-group">${g}</div>
    ${groups[g].map(h=>`<a class="sr-item" href="${h.hash}" data-close="1"><div class="srt">${highlight(h.title,q)}</div><div class="srd">${highlight(h.desc,q)}</div></a>`).join("")}`).join("");
  res.querySelectorAll("a[data-close]").forEach(a=>a.addEventListener("click",closeSearch));
}
function openSearch(){ $("#searchOverlay").classList.add("active"); $("#searchInput").value=""; doSearch(""); setTimeout(()=>$("#searchInput").focus(),50); }
function closeSearch(){ $("#searchOverlay").classList.remove("active"); }
$("#searchBtn").onclick=openSearch;
$("#searchCancel").onclick=closeSearch;
$("#searchInput").addEventListener("input",e=>doSearch(e.target.value));
$("#searchInput").addEventListener("keydown",e=>{ if(e.key==="Escape") closeSearch(); });

/* =========================================================
   啟動 + Service Worker
   ========================================================= */
route();
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }); }
</script>
</body>
</html>
